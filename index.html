  .brk-slot {

  .brk-card {

  .brk-tm {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #1a6b3a;

  .brk-cpair { display: flex; flex-direction: column; }

  .brk-cpair .csb { border-right: 1.5px solid #ddd; border-top: 1.5px solid #ddd; }

// ─── HELPERS ───
function toSGT(utcStr) { return new Date(new Date(utcStr).getTime() + 8*3600*1000); }
function fDate(sgt) {
  const d=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return d[sgt.getUTCDay()]+" "+sgt.getUTCDate()+" "+m[sgt.getUTCMonth()];
}
function fTime(sgt) {
  return String(sgt.getUTCHours()).padStart(2,'0')+":"+String(sgt.getUTCMinutes()).padStart(2,'0');
}
function isPast(utcStr) { return new Date(utcStr) < new Date(); }
function f(team) { return flags[team]||''; }

  });
}

    const s = toSGT(utc);

function renderR32() {

  let html = '<div class="r32-grid">';
  r32Matches.forEach(m => {
    const sgt = toSGT(m.utc);

    html += '<div class="r32-card'+(past?' past':'')+'">'
      + '<div class="r32-match-num">'+m.m+'</div>'
      + '<div class="r32-teams">'
      + '<span>'+m.home+'</span>'

      + '<div class="r32-venue">'+m.venue+'</div>'
      + '</div>';
  });
  html += '</div>';

  // --- Bracket ---
  html += '<div class="bracket-section">';

  bracketRounds.forEach(round => {
    const cols = round.matches.length >= 4 ? 2 : 1;
    const isFinal = round.label === 'Final';
    const isSF = round.label === 'Semifinals';

    html += '<div class="connector-arrow">&#8595;</div>';
    html += '<div class="bracket-round-label">'+round.label
      +'<span class="rdates">'+round.dates+'</span></div>';

    html += '<div class="bracket-grid-'+cols+'">';
    round.matches.forEach(bm => {
      const sgt = toSGT(bm.utc);
      const cardClass = isFinal ? 'b-card final-card' : (isSF ? 'b-card sf-card' : 'b-card');
      html += '<div class="'+cardClass+'">'
        + '<div class="b-teams">'
        + '<span class="tbd">'+bm.t1+'</span>'
        + ' <span style="color:#ddd;font-size:10px">vs</span> '
        + '<span class="tbd">'+bm.t2+'</span>'
        + '</div>'
        + '<div class="b-meta">'
        + '<span class="b-time">'+fDate(sgt)+' '+fTime(sgt)+' SGT</span>'
        + '<span class="b-venue">'+bm.venue+'</span>'
        + '</div>'
        + '</div>';
    });
    html += '</div>';
  });

  html += '</div>'; // bracket-section
  body.innerHTML = html;
}

    const grp = m.m ? m.m : ('Grp '+(groups[m.home]||'?'));
    html += '<div class="next10-card">'
      + '<div class="next10-num">'+(i+1)+'</div>'
      + '<div class="next10-body">'
      + '<div class="next10-teams">'+m.home+' vs '+m.away+'</div>'
      + '<div class="next10-meta">'
      + '<span class="next10-date">'+fDate(sgt)+'</span>'
      + '<span class="next10-grp">'+grp+'</span>'
      + '<span class="next10-venue">'+m.venue+'</span>'
      + '</div></div>'
      + '<div class="next10-timecol">'
      + '<span class="next10-time">'+fTime(sgt)+'</span>'
      + '<span class="next10-sgt">SGT</span>'
      + '</div></div>';
  });
  html += '</div>';
  body.innerHTML = html;
}

// ─── FIND BY TEAM ───
let sortMode = 'alpha';
function setSort(mode) {
  sortMode = mode;
  document.getElementById('btnRanking').classList.toggle('active', mode==='ranking');
  document.getElementById('btnAlpha').classList.toggle('active', mode==='alpha');
  populateDropdown();
}

function populateDropdown() {
  const sel = document.getElementById('teamSelect');
  const current = sel.value;
  const allTeams = [...new Set(matches.flatMap(m => [m.home, m.away]))];
  let sorted;
  if (sortMode==='ranking') {
    sorted = rankingOrder.filter(t => allTeams.includes(t));
    const notRanked = allTeams.filter(t => !rankingOrder.includes(t)).sort();
    sorted = [...sorted, ...notRanked];
  } else {
    sorted = [...allTeams].sort((a,b) => a.localeCompare(b));
  }
  sel.innerHTML = '<option value="">— Choose a team —</option>';
  sorted.forEach((team, idx) => {
    const opt = document.createElement('option');
    opt.value = team;
    if (sortMode==='ranking') {
      opt.textContent = "#"+(idx+1)+"  "+team;
    } else {
      const rank = rankingOrder.indexOf(team);
      opt.textContent = team+(rank>=0?" (FIFA #"+(rank+1)+")":"");
    }
    sel.appendChild(opt);
  });
  if (current) sel.value = current;
}

function renderMatches() {
  const team = document.getElementById('teamSelect').value;
  const out = document.getElementById('output');
  if (!team) { out.innerHTML = '<div class="prompt-hint">Select a team above to see their fixtures.</div>'; return; }

  const flag = flags[team]||'';
  const grp = groups[team]||'?';
  const rankIdx = rankingOrder.indexOf(team);
  const rankStr = rankIdx>=0 ? "FIFA Rank #"+(rankIdx+1) : '';

  // Combine group stage + R32 matches, each tagged with stage label
  const groupMatches = matches
    .filter(m => m.home===team || m.away===team)
    .map(m => ({...m, stageLabel:'Group '+grp}));

  const r32Match = r32Matches.find(m => m.home===team || m.away===team);
  const r32List = r32Match ? [{...r32Match, stageLabel:'Round of 32'}] : [];

  const allMatches = [...groupMatches, ...r32List];

  let upcoming = allMatches.filter(m => !isPast(m.utc)).sort((a,b) => new Date(a.utc)-new Date(b.utc));
  let past     = allMatches.filter(m =>  isPast(m.utc)).sort((a,b) => new Date(b.utc)-new Date(a.utc));

  let html = '<div class="team-header">'
    + '<div class="team-flag">'+flag+'</div>'
    + '<div><div class="team-name">'+team+'</div>'
    + '<div class="team-meta">Group '+grp+(rankStr?' &nbsp;&middot;&nbsp; '+rankStr:'')+'</div>'
    + '</div></div>';

  if (upcoming.length > 0) {
    html += '<div class="count-label">'+upcoming.length+' upcoming match'+(upcoming.length>1?'es':'')+'</div>';
    html += '<div class="matches-list">';
    upcoming.forEach(m => {
      const sgt = toSGT(m.utc);
      const opp = m.home===team ? m.away : m.home;
      const isR32 = !!m.m; // r32Matches have m.m field
      html += '<div class="match-card'+(isR32?' r32-highlight':'')+'">'
        + '<div class="match-card-top"><span class="match-stage">'+m.stageLabel+'</span>'
        + '<span class="match-venue">'+m.venue+'</span></div>'
        + '<div class="match-teams"><span class="selected">'+team+'</span> vs '+opp+'</div>'
        + '<div class="match-time-row">'
        + '<span class="match-date">'+fDate(sgt)+'</span>'
        + '<span class="match-time">'+fTime(sgt)+'</span>'
        + '<span class="sgt-label">SGT</span>'
        + '</div></div>';
    });
    html += '</div>';
  } else {
    html += '<div class="no-matches">No upcoming matches.</div>';
  }

  if (past.length > 0) {
    html += '<div class="section-divider">Played &mdash; '+past.length+' match'+(past.length>1?'es':'')+'</div>';
    html += '<div class="matches-list">';
    past.forEach(m => {
      const sgt = toSGT(m.utc);
      const opp = m.home===team ? m.away : m.home;
      html += '<div class="match-card past">'
        + '<div class="match-card-top"><span class="match-stage">'+m.stageLabel+'</span>'
        + '<span class="match-venue">'+m.venue+'</span></div>'
        + '<div class="match-teams"><span class="selected">'+team+'</span> vs '+opp+'</div>'
        + '<div class="match-time-row">'
        + '<span class="match-date">'+fDate(sgt)+'</span>'
        + '<span class="match-time">'+fTime(sgt)+'</span>'
        + '<span class="sgt-label">SGT</span>'
        + '<span class="past-tag">Played</span>'
        + '</div></div>';
    });
    html += '</div>';
  }
  out.innerHTML = html;
}

document.getElementById('todayDate').textContent = _now.getDate()+" "+_mo[_now.getMonth()]+" "+_now.getFullYear();
