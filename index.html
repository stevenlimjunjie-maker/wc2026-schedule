function formatSGTDate(sgt) {
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return days[sgt.getUTCDay()] + " " + sgt.getUTCDate() + " " + months[sgt.getUTCMonth()];
}
function formatSGTTime(sgt) {
  return String(sgt.getUTCHours()).padStart(2,'0') + ":" + String(sgt.getUTCMinutes()).padStart(2,'0');
}
function isPast(utcStr) { return new Date(utcStr) < new Date(); }

// в”Ђв”Ђв”Ђ TABS в”Ђв”Ђв”Ђ
function switchTab(tab) {
  ['next10','team'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
  });
}

// в”Ђв”Ђв”Ђ NEXT 10 в”Ђв”Ђв”Ђ
function renderNext10() {
  const now = new Date();
  const upcoming = matches
    .filter(m => new Date(m.utc) > now)
    .sort((a, b) => new Date(a.utc) - new Date(b.utc))
    .slice(0, 10);

  const nowSgt = toSGT(now.toISOString());
  document.getElementById('next10Updated').textContent =
    'As of ' + formatSGTDate(nowSgt) + ' ' + formatSGTTime(nowSgt) + ' SGT';

  const body = document.getElementById('next10Body');
  if (upcoming.length === 0) {
    body.innerHTML = '<div class="next10-all-done">All group stage matches have been played.</div>';
    return;
  }

  let html = '<div class="next10-list">';
  upcoming.forEach((m, i) => {
    const sgt = toSGT(m.utc);
    const grp = groups[m.home] || '?';
    html += '<div class="next10-card">'
      + '<div class="next10-num">' + (i + 1) + '</div>'
      + '<div class="next10-body">'
      + '<div class="next10-teams">'
      + (flags[m.home]||'') + ' ' + m.home + ' vs ' + (flags[m.away]||'') + ' ' + m.away
      + '</div>'
      + '<div class="next10-meta">'
      + '<span class="next10-date">' + formatSGTDate(sgt) + '</span>'
      + '<span class="next10-grp">Grp ' + grp + '</span>'
      + '<span class="next10-venue">' + m.venue + '</span>'
      + '</div></div>'
      + '<div class="next10-timecol">'
      + '<span class="next10-time">' + formatSGTTime(sgt) + '</span>'
      + '<span class="next10-sgt">SGT</span>'
      + '</div></div>';
  });
  html += '</div>';
  body.innerHTML = html;
}

// в”Ђв”Ђв”Ђ TEAM LOOKUP в”Ђв”Ђв”Ђ
let sortMode = 'alpha';

function setSort(mode) {
  sortMode = mode;
  document.getElementById('btnRanking').classList.toggle('active', mode === 'ranking');
  document.getElementById('btnAlpha').classList.toggle('active', mode === 'alpha');
  populateDropdown();
}

function populateDropdown() {
  const sel = document.getElementById('teamSelect');
  const current = sel.value;
  const allTeams = [...new Set(matches.flatMap(m => [m.home, m.away]))];

  let sorted;
  if (sortMode === 'ranking') {
    sorted = rankingOrder.filter(t => allTeams.includes(t));
    const notRanked = allTeams.filter(t => !rankingOrder.includes(t)).sort();
    sorted = [...sorted, ...notRanked];
  } else {
    sorted = [...allTeams].sort((a, b) => a.localeCompare(b));
  }

  sel.innerHTML = '<option value="">вЂ” Choose a team вЂ”</option>';
  sorted.forEach((team, idx) => {
    const opt = document.createElement('option');
    opt.value = team;
    if (sortMode === 'ranking') {
      opt.textContent = "#" + (idx + 1) + "  " + team;
    } else {
      const rank = rankingOrder.indexOf(team);
      opt.textContent = team + (rank >= 0 ? " (FIFA #" + (rank + 1) + ")" : "");
    }
    sel.appendChild(opt);
  });

  if (current) sel.value = current;
}

function renderMatches() {
  const team = document.getElementById('teamSelect').value;
  const out = document.getElementById('output');
  if (!team) { out.innerHTML = '<div class="prompt-hint">Select a team above to see their fixtures.</div>'; return; }

  const teamMatches = matches.filter(m => m.home === team || m.away === team);
  const flag = flags[team] || '';
  const grp = groups[team] || '?';
  const rankIdx = rankingOrder.indexOf(team);
  const rankStr = rankIdx >= 0 ? "FIFA Rank #" + (rankIdx + 1) : '';

  let upcoming = [], past = [];
  teamMatches.forEach(m => isPast(m.utc) ? past.push(m) : upcoming.push(m));
  upcoming.sort((a, b) => new Date(a.utc) - new Date(b.utc));
  past.sort((a, b) => new Date(b.utc) - new Date(a.utc));

  let html = '<div class="team-header">'
    + '<div class="team-flag">' + flag + '</div>'
    + '<div><div class="team-name">' + team + '</div>'
    + '<div class="team-meta">Group ' + grp + (rankStr ? ' &nbsp;В·&nbsp; ' + rankStr : '') + '</div>'
    + '</div></div>';

  if (upcoming.length > 0) {
    html += '<div class="count-label">' + upcoming.length + ' upcoming match' + (upcoming.length > 1 ? 'es' : '') + '</div>';
    html += '<div class="matches-list">';
    upcoming.forEach(m => {
      const sgt = toSGT(m.utc);
      const opp = m.home === team ? m.away : m.home;
      html += '<div class="match-card">'
        + '<div class="match-card-top"><span class="match-stage">Group ' + grp + '</span>'
        + '<span class="match-venue">' + m.venue + '</span></div>'
        + '<div class="match-teams"><span class="selected">' + team + '</span> vs '
        + (flags[opp]||'') + ' ' + opp + '</div>'
        + '<div class="match-time-row">'
        + '<span class="match-date">' + formatSGTDate(sgt) + '</span>'
        + '<span class="match-time">' + formatSGTTime(sgt) + '</span>'
        + '<span class="sgt-label">SGT</span>'
        + '</div></div>';
    });
    html += '</div>';
  } else {
    html += '<div class="no-matches">No upcoming group stage matches.</div>';
  }

  if (past.length > 0) {
    html += '<div class="section-divider">Played &mdash; ' + past.length + ' match' + (past.length > 1 ? 'es' : '') + '</div>';
    html += '<div class="matches-list">';
    past.forEach(m => {
      const sgt = toSGT(m.utc);
      const opp = m.home === team ? m.away : m.home;
      html += '<div class="match-card past">'
        + '<div class="match-card-top"><span class="match-stage">Group ' + grp + '</span>'
        + '<span class="match-venue">' + m.venue + '</span></div>'
        + '<div class="match-teams"><span class="selected">' + team + '</span> vs '
        + (flags[opp]||'') + ' ' + opp + '</div>'
        + '<div class="match-time-row">'
        + '<span class="match-date">' + formatSGTDate(sgt) + '</span>'
        + '<span class="match-time">' + formatSGTTime(sgt) + '</span>'
        + '<span class="sgt-label">SGT</span>'
        + '<span class="past-tag">Played</span>'
        + '</div></div>';
    });
    html += '</div>';
  }

  out.innerHTML = html;
}

const mo = ["January","February","March","April","May","June","July","August","September","October","November","December"];
document.getElementById('todayDate').textContent = now.getDate() + " " + mo[now.getMonth()] + " " + now.getFullYear();

renderNext10();
populateDropdown();
</script>
